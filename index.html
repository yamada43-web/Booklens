<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>📚 BookLens</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700;900&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --primary: #0a0a0f;
    --accent-blue: #00b4ff;
    --accent-gold: #ffd700;
    --glass: rgba(10, 10, 20, 0.88);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--primary);
    font-family: 'Noto Sans JP', sans-serif;
    color: white;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .header {
    position: relative;
    z-index: 100;
    padding: 12px 16px 8px;
    background: linear-gradient(180deg, rgba(0,0,0,0.92) 0%, transparent 100%);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 18px;
    font-weight: 700;
    color: var(--accent-blue);
    text-shadow: 0 0 20px rgba(0,180,255,0.5);
  }
  .logo span { color: white; }

  .header-right { display: flex; align-items: center; gap: 8px; }

  .key-btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.6);
    border-radius: 20px;
    padding: 7px 12px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
  }

  .scan-btn {
    background: var(--accent-blue);
    color: white;
    border: none;
    border-radius: 24px;
    padding: 10px 20px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    box-shadow: 0 0 20px rgba(0,180,255,0.4);
    transition: all 0.2s;
    white-space: nowrap;
  }
  .scan-btn:active { transform: scale(0.96); }
  .scan-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .scan-btn.scanning { animation: pulse-btn 1.5s ease-in-out infinite; }
  @keyframes pulse-btn {
    0%,100% { box-shadow: 0 0 20px rgba(0,180,255,0.4); }
    50% { box-shadow: 0 0 40px rgba(0,180,255,0.9); }
  }

  .camera-container {
    position: relative;
    flex: 1;
    overflow: hidden;
    background: #050508;
  }

  #video { width: 100%; height: 100%; object-fit: cover; display: block; }
  #canvas { display: none; }

  .scan-overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .scan-overlay.active { opacity: 1; }

  .scan-line {
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent-blue), transparent);
    box-shadow: 0 0 10px var(--accent-blue), 0 0 20px var(--accent-blue);
    animation: scan-move 2s ease-in-out infinite;
  }
  @keyframes scan-move {
    0% { top: 10%; opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { top: 90%; opacity: 0; }
  }

  .corner { position: absolute; width: 28px; height: 28px; border-color: var(--accent-blue); border-style: solid; opacity: 0.7; }
  .corner.tl { top: 16px; left: 16px; border-width: 2px 0 0 2px; }
  .corner.tr { top: 16px; right: 16px; border-width: 2px 2px 0 0; }
  .corner.bl { bottom: 16px; left: 16px; border-width: 0 0 2px 2px; }
  .corner.br { bottom: 16px; right: 16px; border-width: 0 2px 2px 0; }

  .books-overlay { position: absolute; inset: 0; overflow: hidden; }

  .book-card {
    position: absolute;
    background: var(--glass);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-radius: 10px;
    padding: 8px 10px;
    min-width: 130px;
    max-width: 190px;
    border: 1px solid rgba(255,255,255,0.1);
    animation: card-appear 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
    cursor: pointer;
    transition: transform 0.15s;
  }
  .book-card:active { transform: scale(0.96) !important; }

  .book-card.high {
    border-color: rgba(0,180,255,0.55);
    box-shadow: 0 0 18px rgba(0,180,255,0.2), inset 0 0 20px rgba(0,180,255,0.04);
  }
  .book-card.high::before {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: 11px;
    background: linear-gradient(135deg, rgba(0,180,255,0.25), transparent 55%);
    pointer-events: none;
  }

  @keyframes card-appear {
    from { opacity: 0; transform: translateY(10px) scale(0.88); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .book-title {
    font-size: 11px;
    font-weight: 700;
    line-height: 1.35;
    margin-bottom: 5px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .book-card.high .book-title { color: #ddf4ff; }

  .rating-row { display: flex; align-items: center; gap: 4px; }
  .stars { font-size: 10px; }
  .s-on  { color: var(--accent-gold); }
  .s-off { color: rgba(255,255,255,0.2); }
  .book-card.high .s-on { color: var(--accent-blue); }

  .score {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
  }
  .book-card.high .score { color: var(--accent-blue); }
  .book-card:not(.high) .score { color: var(--accent-gold); }

  .rev-count { font-size: 9px; color: rgba(255,255,255,0.4); margin-top: 2px; font-family: 'Space Mono', monospace; }

  .badge {
    display: inline-block;
    background: var(--accent-blue);
    color: white;
    font-size: 8px;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 3px;
    margin-top: 3px;
    letter-spacing: 0.5px;
  }

  .dot-marker {
    position: absolute;
    width: 8px; height: 8px;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    animation: dot-pop 0.3s ease both;
  }
  @keyframes dot-pop {
    from { transform: translate(-50%,-50%) scale(0); }
    to   { transform: translate(-50%,-50%) scale(1); }
  }

  .loading-card {
    position: absolute;
    left: 50%; bottom: 30px;
    transform: translateX(-50%);
    background: var(--glass);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 24px;
    padding: 10px 18px;
    border: 1px solid rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    gap: 10px;
    white-space: nowrap;
  }
  .dots span {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent-blue);
    animation: dot-bounce 1.1s ease-in-out infinite;
    margin: 0 1px;
  }
  .dots span:nth-child(2) { animation-delay: 0.18s; }
  .dots span:nth-child(3) { animation-delay: 0.36s; }
  @keyframes dot-bounce {
    0%,80%,100% { transform: scale(0.55); opacity: 0.4; }
    40%          { transform: scale(1);    opacity: 1; }
  }
  .load-txt { font-size: 12px; color: rgba(255,255,255,0.65); }

  /* Full-screen overlays */
  .full-screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 32px 28px;
    text-align: center;
    z-index: 50;
    background: radial-gradient(ellipse at center, rgba(0,80,160,0.12) 0%, transparent 70%);
  }
  .full-screen.hidden { display: none; }

  .fs-icon { font-size: 52px; filter: drop-shadow(0 0 16px rgba(0,180,255,0.4)); }
  .fs-title { font-size: 20px; font-weight: 900; letter-spacing: -0.5px; }
  .fs-desc { font-size: 13px; color: rgba(255,255,255,0.55); line-height: 1.7; max-width: 290px; }

  .big-btn {
    background: var(--accent-blue);
    color: white;
    border: none;
    border-radius: 28px;
    padding: 13px 30px;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(0,180,255,0.35);
    transition: all 0.2s;
    margin-top: 6px;
  }
  .big-btn:active { transform: scale(0.97); }

  .api-input {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(0,180,255,0.45);
    border-radius: 12px;
    padding: 12px 16px;
    color: white;
    font-size: 14px;
    width: 100%;
    max-width: 310px;
    outline: none;
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.5px;
  }
  .api-input:focus { border-color: var(--accent-blue); box-shadow: 0 0 0 3px rgba(0,180,255,0.15); }
  .api-input::placeholder { color: rgba(255,255,255,0.25); }

  /* Bottom bar */
  .bottom-panel {
    position: relative;
    z-index: 100;
    background: linear-gradient(0deg, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.65) 100%);
    padding: 8px 16px 14px;
  }
  .legend { display: flex; gap: 14px; margin-bottom: 6px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 10px; color: rgba(255,255,255,0.55); }
  .ldot { width: 8px; height: 8px; border-radius: 2px; }
  .ldot.blue { background: var(--accent-blue); }
  .ldot.gold { background: var(--accent-gold); }

  .status-bar { display: flex; align-items: center; justify-content: space-between; }
  .status-txt { font-size: 11px; color: rgba(255,255,255,0.45); font-family: 'Space Mono', monospace; }
  .status-txt.on { color: var(--accent-blue); }
  .found-txt { font-size: 11px; color: rgba(255,255,255,0.35); font-family: 'Space Mono', monospace; }

  @supports (padding-bottom: env(safe-area-inset-bottom)) {
    .bottom-panel { padding-bottom: calc(14px + env(safe-area-inset-bottom)); }
  }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.82);
    z-index: 200;
    display: flex; align-items: flex-end;
    opacity: 0; pointer-events: none;
    transition: opacity 0.22s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: auto; }

  .modal {
    background: linear-gradient(180deg, #0e0e1c 0%, #07070f 100%);
    border-radius: 22px 22px 0 0;
    padding: 18px 20px 36px;
    width: 100%;
    border-top: 1px solid rgba(255,255,255,0.08);
    transform: translateY(100%);
    transition: transform 0.32s cubic-bezier(0.34,1.56,0.64,1);
    position: relative;
  }
  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-handle { width: 34px; height: 3px; background: rgba(255,255,255,0.18); border-radius: 2px; margin: 0 auto 14px; }
  .modal-close { position: absolute; top: 18px; right: 18px; background: rgba(255,255,255,0.07); border: none; color: white; width: 30px; height: 30px; border-radius: 50%; font-size: 14px; cursor: pointer; }

  .modal-title { font-size: 17px; font-weight: 900; letter-spacing: -0.3px; margin-bottom: 3px; }
  .modal-author { font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 14px; }

  .modal-body {
    display: flex; align-items: flex-start; gap: 14px;
    padding: 14px 16px; border-radius: 12px; margin-bottom: 10px;
  }
  .modal-body.high { background: rgba(0,180,255,0.1); border: 1px solid rgba(0,180,255,0.22); }
  .modal-body.low  { background: rgba(255,215,0,0.07); border: 1px solid rgba(255,215,0,0.18); }

  .modal-score { font-family: 'Space Mono', monospace; font-size: 34px; font-weight: 700; line-height: 1; }
  .modal-body.high .modal-score { color: var(--accent-blue); }
  .modal-body.low  .modal-score { color: var(--accent-gold); }
  .modal-stars { font-size: 17px; margin-top: 3px; }
  .modal-body.high .s-on { color: var(--accent-blue); }
  .modal-revs { font-size: 11px; color: rgba(255,255,255,0.38); margin-top: 3px; font-family: 'Space Mono', monospace; }

  .modal-info { flex: 1; }
  .modal-badge { font-size: 12px; font-weight: 700; margin-bottom: 5px; }
  .modal-body.high .modal-badge { color: var(--accent-blue); }
  .modal-body.low  .modal-badge { color: var(--accent-gold); }
  .modal-desc { font-size: 12px; color: rgba(255,255,255,0.45); line-height: 1.6; }

  .modal-note { font-size: 10px; color: rgba(255,255,255,0.28); text-align: center; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.06); line-height: 1.6; }

  /* Flash & Toast */
  .flash { position: fixed; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 500; transition: opacity 0.08s; }
  .flash.on { opacity: 0.6; }

  .toast {
    position: fixed; bottom: 90px; left: 50%;
    transform: translateX(-50%) translateY(16px);
    background: rgba(220,50,50,0.92);
    color: white; padding: 9px 18px; border-radius: 20px;
    font-size: 12px; white-space: nowrap;
    opacity: 0; transition: all 0.28s; z-index: 400;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="flash" id="flash"></div>

<div class="header">
  <div class="logo">📚 Book<span>Lens</span></div>
  <div class="header-right">
    <button class="key-btn" onclick="showApiScreen()">🔑 APIキー</button>
    <button class="scan-btn" id="scanBtn" onclick="startScan()">
      <span id="scanIcon">🔍</span>
      <span id="scanTxt">本棚をスキャン</span>
    </button>
  </div>
</div>

<div class="camera-container">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>

  <!-- API Key screen -->
  <div class="full-screen" id="screenKey">
    <div class="fs-icon">🔑</div>
    <div class="fs-title">APIキーを設定</div>
    <div class="fs-desc">
      Anthropic APIキーを入力してください。<br>
      キーはこの端末内にのみ保存されます。<br>
      <a href="https://console.anthropic.com/" target="_blank" style="color:var(--accent-blue)">console.anthropic.com</a> で取得できます。
    </div>
    <input class="api-input" type="password" id="apiInput" placeholder="sk-ant-api03-..." />
    <button class="big-btn" onclick="saveKey()">✅ 保存してカメラを起動</button>
  </div>

  <!-- Camera permission screen -->
  <div class="full-screen hidden" id="screenCam">
    <div class="fs-icon">📚</div>
    <div class="fs-title">本棚スキャナー</div>
    <div class="fs-desc">
      カメラで本棚を撮影すると、各本の評価を<br>
      <strong>リアルタイムで画面に表示</strong>します。<br>
      <span style="color:var(--accent-blue)">★4以上</span>の高評価本は青色でハイライト。
    </div>
    <button class="big-btn" onclick="initCamera()">📷 カメラを起動</button>
  </div>

  <!-- Scan overlay -->
  <div class="scan-overlay" id="scanOverlay">
    <div class="scan-line"></div>
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
  </div>

  <!-- AR book cards -->
  <div class="books-overlay" id="booksOverlay"></div>
</div>

<div class="bottom-panel">
  <div class="legend">
    <div class="legend-item"><div class="ldot blue"></div>★4以上（高評価）</div>
    <div class="legend-item"><div class="ldot gold"></div>★4未満</div>
  </div>
  <div class="status-bar">
    <div class="status-txt" id="statusTxt">APIキーを設定してください</div>
    <div class="found-txt" id="foundTxt"></div>
  </div>
</div>

<!-- Detail modal -->
<div class="modal-overlay" id="modalOverlay" onclick="onModalBg(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title" id="mTitle"></div>
    <div class="modal-author" id="mAuthor"></div>
    <div class="modal-body" id="mBody">
      <div>
        <div class="modal-score" id="mScore"></div>
        <div class="modal-stars" id="mStars"></div>
        <div class="modal-revs" id="mRevs"></div>
      </div>
      <div class="modal-info">
        <div class="modal-badge" id="mBadge"></div>
        <div class="modal-desc" id="mDesc"></div>
      </div>
    </div>
    <div class="modal-note">※ 評価はAIによる推定です。実際のAmazon評価と異なる場合があります。</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── State ───────────────────────────────────────────────
let apiKey = localStorage.getItem('bl_key') || '';
let cameraReady = false;
let scanning = false;
let lastBooks = [];

// ─── Init ────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  if (apiKey) {
    show('screenCam');
    setStatus('準備完了 — カメラを起動してください');
  }
});

// ─── API Key ─────────────────────────────────────────────
function showApiScreen() {
  document.getElementById('apiInput').value = apiKey;
  show('screenKey');
}

function saveKey() {
  const v = document.getElementById('apiInput').value.trim();
  if (!v.startsWith('sk-')) { toast('正しいAPIキーを入力してください（sk-ant-...）'); return; }
  apiKey = v;
  localStorage.setItem('bl_key', apiKey);
  if (cameraReady) { hide('screenKey'); }
  else { show('screenCam'); }
}

// ─── Camera ──────────────────────────────────────────────
async function initCamera() {
  try {
    const s = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } }
    });
    document.getElementById('video').srcObject = s;
    cameraReady = true;
    hide('screenCam');
    setStatus('準備完了 — 本棚にカメラを向けてスキャン');
  } catch(e) {
    toast('カメラエラー: ' + e.message);
  }
}

// ─── Scan ────────────────────────────────────────────────
async function startScan() {
  if (scanning) return;
  if (!apiKey) { showApiScreen(); return; }
  if (!cameraReady) { initCamera(); return; }

  scanning = true;
  const btn = document.getElementById('scanBtn');
  btn.className = 'scan-btn scanning';
  btn.disabled = true;
  document.getElementById('scanIcon').textContent = '⏳';
  document.getElementById('scanTxt').textContent = 'スキャン中...';
  document.getElementById('scanOverlay').classList.add('active');
  setStatus('📷 画像を解析中...', true);

  // Flash
  const fl = document.getElementById('flash');
  fl.classList.add('on');
  setTimeout(() => fl.classList.remove('on'), 120);

  // Capture
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  canvas.width = video.videoWidth || 1280;
  canvas.height = video.videoHeight || 720;
  canvas.getContext('2d').drawImage(video, 0, 0);
  const b64 = canvas.toDataURL('image/jpeg', 0.85).split(',')[1];

  // Clear
  document.getElementById('booksOverlay').innerHTML = '';
  document.getElementById('foundTxt').textContent = '';
  lastBooks = [];

  // Loading indicator
  const lc = document.createElement('div');
  lc.className = 'loading-card';
  lc.innerHTML = `<div class="dots"><span></span><span></span><span></span></div><div class="load-txt">本のタイトルを識別中...</div>`;
  document.getElementById('booksOverlay').appendChild(lc);

  try {
    const books = await callClaude(b64);
    document.getElementById('booksOverlay').innerHTML = '';

    if (!books.length) {
      toast('本が見つかりませんでした。もっと近づいて再スキャン');
      setStatus('本が見つかりませんでした');
    } else {
      lastBooks = books;
      renderCards(books);
      document.getElementById('foundTxt').textContent = books.length + '冊検出';
      setStatus(`✅ ${books.length}冊の評価を取得しました`, true);
    }
  } catch(err) {
    document.getElementById('booksOverlay').innerHTML = '';
    setStatus('エラーが発生しました');
    toast('エラー: ' + (err.message || 'API接続を確認'));
    console.error(err);
  }

  scanning = false;
  btn.className = 'scan-btn';
  btn.disabled = false;
  document.getElementById('scanIcon').textContent = '🔍';
  document.getElementById('scanTxt').textContent = '再スキャン';
  document.getElementById('scanOverlay').classList.remove('active');
}

// ─── Claude API ──────────────────────────────────────────
async function callClaude(b64) {
  const prompt = `You are analyzing a bookshelf photo.
Identify ALL visible book spines. For each book return realistic data based on your knowledge.

Return ONLY a JSON array (no markdown, no explanation):
[{"title":"タイトル","author":"著者","rating":4.2,"reviews":1850,"x_pct":20,"y_pct":50,"short_desc":"一言説明15字以内"}]

- rating: realistic 3.0-5.0 float. Most books 3.5-4.4. Classics/bestsellers can be higher.
- reviews: realistic integer for Amazon Japan
- x_pct / y_pct: approximate center of book spine as % of image dimensions (0-100)
- short_desc: in Japanese, max 15 chars
If no books are clearly visible return [].`;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-opus-4-5',
      max_tokens: 1500,
      messages: [{
        role: 'user',
        content: [
          { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: b64 } },
          { type: 'text', text: prompt }
        ]
      }]
    })
  });

  if (!res.ok) {
    const e = await res.json().catch(() => ({}));
    throw new Error(e.error?.message || 'HTTP ' + res.status);
  }

  const data = await res.json();
  const raw = data.content.map(c => c.text || '').join('').replace(/```json|```/g, '').trim();
  try { return JSON.parse(raw); }
  catch {
    const m = raw.match(/\[[\s\S]*\]/);
    return m ? JSON.parse(m[0]) : [];
  }
}

// ─── Render cards ────────────────────────────────────────
function renderCards(books) {
  const overlay = document.getElementById('booksOverlay');
  const W = overlay.clientWidth;
  const H = overlay.clientHeight;

  books.forEach((b, i) => {
    const hi = b.rating >= 4.0;
    const cx = (b.x_pct / 100) * W;
    const cy = (b.y_pct / 100) * H;

    // Dot marker on spine
    const dot = document.createElement('div');
    dot.className = 'dot-marker';
    dot.style.cssText = `left:${cx}px;top:${cy}px;width:8px;height:8px;background:${hi ? 'var(--accent-blue)' : 'rgba(255,215,0,0.8)'};box-shadow:0 0 8px ${hi ? 'var(--accent-blue)' : 'rgba(255,215,0,0.6)'};animation-delay:${i*0.06}s`;
    overlay.appendChild(dot);

    // Card position — spread vertically to avoid overlap
    let cardTop, cardLeft;
    const col = i % 2; // alternate left / right half
    if (books.length <= 4) {
      cardTop = Math.min(H - 100, Math.max(10, cy - 40));
      cardLeft = col === 0 ? Math.max(8, cx - 160) : Math.min(W - 200, cx + 10);
    } else {
      const perCol = Math.ceil(books.length / 2);
      const rowInCol = Math.floor(i / 2);
      cardTop = 12 + rowInCol * Math.min(90, (H - 24) / perCol);
      cardLeft = col === 0 ? 8 : W - 198;
    }
    cardLeft = Math.max(8, Math.min(W - 200, cardLeft));
    cardTop  = Math.max(8, Math.min(H - 100, cardTop));

    const card = document.createElement('div');
    card.className = 'book-card' + (hi ? ' high' : '');
    card.style.cssText = `left:${cardLeft}px;top:${cardTop}px;animation-delay:${i*0.07}s`;
    card.innerHTML = `
      <div class="book-title">${esc(b.title)}</div>
      <div class="rating-row">
        <span class="stars">${stars(b.rating, hi)}</span>
        <span class="score">${b.rating.toFixed(1)}</span>
      </div>
      <div class="rev-count">${fmtRev(b.reviews)}件のレビュー</div>
      ${hi ? '<div class="badge">⭐ 高評価</div>' : ''}
    `;
    card.onclick = () => openModal(b);
    overlay.appendChild(card);
  });
}

// ─── Modal ───────────────────────────────────────────────
function openModal(b) {
  const hi = b.rating >= 4.0;
  document.getElementById('mTitle').textContent = b.title;
  document.getElementById('mAuthor').textContent = b.author ? '著者: ' + b.author : '';
  document.getElementById('mScore').textContent = b.rating.toFixed(1);
  document.getElementById('mStars').innerHTML = stars(b.rating, hi);
  document.getElementById('mRevs').textContent = fmtRev(b.reviews) + '件のレビュー';
  document.getElementById('mBody').className = 'modal-body ' + (hi ? 'high' : 'low');
  document.getElementById('mBadge').textContent = hi ? '🔵 高評価おすすめ' : '📖 参考評価';
  document.getElementById('mDesc').textContent = b.short_desc || '';
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function onModalBg(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); }

// ─── Helpers ─────────────────────────────────────────────
function stars(r, hi) {
  let s = '';
  for (let i = 1; i <= 5; i++) {
    const full = i <= Math.floor(r);
    const half = !full && i === Math.ceil(r) && r % 1 >= 0.3;
    s += `<span class="${full || half ? 's-on' : 's-off'}">★</span>`;
  }
  return s;
}
function fmtRev(n) {
  if (n >= 10000) return (n/10000).toFixed(1) + '万';
  if (n >= 1000)  return (n/1000).toFixed(1) + 'k';
  return String(n);
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function setStatus(txt, on) {
  const el = document.getElementById('statusTxt');
  el.textContent = txt;
  el.className = 'status-txt' + (on ? ' on' : '');
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3800);
}
function show(id) {
  document.querySelectorAll('.full-screen').forEach(el => el.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}
function hide(id) { document.getElementById(id).classList.add('hidden'); }

window.addEventListener('resize', () => {
  if (lastBooks.length) {
    document.getElementById('booksOverlay').innerHTML = '';
    renderCards(lastBooks);
  }
});
</script>
